name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - main


permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false



jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15]

    steps:
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install repo tool
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update
            sudo apt-get install -y repo
          elif [ "$RUNNER_OS" = "macOS" ]; then
            brew install repo
          fi

      - name: Prepare workspace and repo init
        run: |
          repo init https://github.com/arm/ai-ml-sdk-manifest.git -b ${{ github.ref_name }}  --depth=1

      - name: repo sync
        run: |
          set -euxo pipefail
          nproc_compat() {
            if command -v nproc >/dev/null 2>&1; then
              nproc
            elif [ "$(uname)" = "Darwin" ]; then
              sysctl -n hw.ncpu
            else
              getconf _NPROCESSORS_ONLN
            fi
          }
          J=$(nproc_compat)
          repo sync -j "$J"

      - name: Build
        run: ./scripts/build.py
